name: Terraform Destroy

on:
  workflow_dispatch:   # manual trigger button

jobs:
  destroy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # ✅ 1. Get your repo code
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ 2. Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ✅ 3. Authenticate to GCP (OIDC)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/109344998901/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "terraform-sa@application-prod-497803.iam.gserviceaccount.com"

      # ✅ 4. Init Terraform (IMPORTANT)
      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      # ✅ 5. Destroy infrastructure
      - name: Terraform Destroy
        working-directory: environments/dev
        run: terraform destroy -auto-approve
